[build]
  command = "npm run build"
  publish = "dist"

# Rewrite /api/* to the serverless function
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/api"
  status = 200

# SPA fallback — required for Vue Router history mode
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
